name: Publish image to GHCR

# Builds the stdio MCP image and pushes it to ghcr.io/milos106/ares-mcp.
# The image carries the io.modelcontextprotocol.server.name label (from the Dockerfile),
# which the official MCP Registry uses to verify ownership.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (e.g. 0.1.0)"
        required: true
        default: "0.1.0"
  release:
    types: [published]

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/ares-mcp

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.tag.outputs.value }}
            ${{ env.IMAGE }}:latest
